<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 | Vape Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #171717; }

        /* Login */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 2.5rem; width: 340px; text-align: center; }
        .login-box h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        .login-box input { width: 100%; padding: 0.875rem; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; }
        .login-box input:focus { outline: none; border-color: #000; }
        .login-btn { width: 100%; padding: 0.875rem; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .login-error { color: #dc2626; font-size: 0.875rem; margin-top: 0.75rem; display: none; }

        /* Header */
        .admin-header { background: #000; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .admin-header h1 { font-size: 1.25rem; }
        .header-actions { display: flex; gap: 0.75rem; align-items: center; }
        .header-select { padding: 0.5rem 0.875rem; border: 1px solid #404040; background: #262626; color: #fff; border-radius: 6px; font-size: 0.875rem; cursor: pointer; }
        .logout-btn { padding: 0.5rem 1rem; background: #262626; color: #fff; border: 1px solid #404040; border-radius: 6px; font-size: 0.875rem; cursor: pointer; }
        .logout-btn:hover { background: #404040; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; padding: 1.5rem 2rem; }
        .stat-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1.25rem; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { color: #737373; font-size: 0.875rem; margin-top: 0.25rem; }
        .stat-card.green .stat-value { color: #16a34a; }
        .stat-card.orange .stat-value { color: #d97706; }
        .stat-card.blue .stat-value { color: #2563eb; }

        /* Orders */
        .orders-section { padding: 0 2rem 2rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-header h2 { font-size: 1.1rem; }
        .refresh-btn { padding: 0.5rem 1rem; background: #000; color: #fff; border: none; border-radius: 6px; font-size: 0.875rem; cursor: pointer; }

        .order-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1.25rem; margin-bottom: 0.875rem; }
        .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.875rem; flex-wrap: wrap; gap: 0.5rem; }
        .order-number { font-weight: 700; font-size: 1rem; }
        .order-date { color: #737373; font-size: 0.8rem; }
        .order-customer { color: #525252; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .order-customer i { width: 16px; color: #a3a3a3; }
        .order-items { font-size: 0.85rem; color: #525252; margin-bottom: 0.875rem; line-height: 1.6; }
        .order-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
        .order-total { font-size: 1.25rem; font-weight: 700; }
        .order-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

        /* Badges */
        .badge { padding: 0.25rem 0.625rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-paid { background: #dcfce7; color: #166534; }
        .badge-shipped { background: #dbeafe; color: #1e40af; }
        .badge-delivered { background: #f3e8ff; color: #6b21a8; }
        .badge-bizum { background: #fce7f3; color: #9d174d; }
        .badge-card { background: #e0f2fe; color: #075985; }

        /* Status select */
        .status-select { padding: 0.375rem 0.625rem; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .status-select:focus { outline: none; border-color: #000; }

        .empty-state { text-align: center; padding: 3rem; color: #737373; }
        .loading-state { text-align: center; padding: 3rem; color: #737373; }

        @media (max-width: 600px) {
            .stats-grid { padding: 1rem; }
            .orders-section { padding: 0 1rem 2rem; }
            .admin-header { padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h2>🔐 管理员登录</h2>
        <input type="password" id="admin-password-input" placeholder="输入管理密码" onkeydown="if(event.key==='Enter') adminLogin()">
        <button class="login-btn" onclick="adminLogin()">登录</button>
        <p class="login-error" id="login-error">密码错误，请重试</p>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
    <header class="admin-header">
        <h1>📦 Vape Store 订单管理</h1>
        <div class="header-actions">
            <select class="header-select" id="status-filter" onchange="loadOrders()">
                <option value="all">全部订单</option>
                <option value="pending">待付款</option>
                <option value="paid">已付款</option>
                <option value="shipped">已发货</option>
                <option value="delivered">已完成</option>
            </select>
            <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">总订单数</div>
        </div>
        <div class="stat-card green">
            <div class="stat-value" id="stat-revenue">—</div>
            <div class="stat-label">总收入</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-value" id="stat-pending">—</div>
            <div class="stat-label">待处理订单</div>
        </div>
        <div class="stat-card blue">
            <div class="stat-value" id="stat-today">—</div>
            <div class="stat-label">今日订单</div>
        </div>
    </div>

    <div class="orders-section">
        <div class="section-header">
            <h2>订单列表</h2>
            <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
        <div id="orders-container">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>
</div>

<script>
    const STATUS_LABELS = {
        pending: '待付款', paid: '已付款', shipped: '已发货', delivered: '已完成'
    };
    const STATUS_BADGE = {
        pending: 'badge-pending', paid: 'badge-paid', shipped: 'badge-shipped', delivered: 'badge-delivered'
    };

    let adminPass = '';

    function adminLogin() {
        const input = document.getElementById('admin-password-input').value;
        if (!input) return;
        adminPass = input;
        loadOrders(true);
    }

    function adminLogout() {
        adminPass = '';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-password-input').value = '';
    }

    async function loadOrders(isLogin = false) {
        const status = document.getElementById('status-filter')?.value || 'all';
        const res = await fetch(`/.netlify/functions/get-orders?password=${encodeURIComponent(adminPass)}&status=${status}`);

        if (res.status === 401) {
            document.getElementById('login-error').style.display = 'block';
            return;
        }

        if (isLogin) {
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        const orders = await res.json();
        renderStats(orders);
        renderOrders(orders);
    }

    function renderStats(orders) {
        const today = new Date().toDateString();
        const paid = orders.filter(o => o.payment_status !== 'pending');
        const pending = orders.filter(o => o.payment_status === 'pending');
        const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);
        const revenue = paid.reduce((s, o) => s + parseFloat(o.total), 0);

        document.getElementById('stat-total').textContent = orders.length;
        document.getElementById('stat-revenue').textContent = '€' + revenue.toFixed(2);
        document.getElementById('stat-pending').textContent = pending.length;
        document.getElementById('stat-today').textContent = todayOrders.length;
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        if (!orders.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:1rem;display:block"></i>暂无订单</div>';
            return;
        }

        container.innerHTML = orders.map(order => {
            const date = new Date(order.created_at).toLocaleString('zh-CN');
            const itemsList = order.items.map(i => `${i.name} ×${i.quantity}`).join('、');
            const payBadge = order.payment_method === 'bizum' ? 'badge-bizum' : 'badge-card';
            const payLabel = order.payment_method === 'bizum' ? 'Bizum' : '银行卡';
            const statusBadge = STATUS_BADGE[order.payment_status] || 'badge-pending';
            const statusLabel = STATUS_LABELS[order.payment_status] || order.payment_status;

            return `
            <div class="order-card">
                <div class="order-top">
                    <div>
                        <div class="order-number">${order.order_number}</div>
                        <div class="order-date">${date}</div>
                    </div>
                    <span class="badge ${statusBadge}">${statusLabel}</span>
                </div>
                <div class="order-customer">
                    <i class="fas fa-user"></i> ${order.customer_name}
                    &nbsp;&nbsp;<i class="fas fa-phone"></i> ${order.customer_phone}
                </div>
                <div class="order-items">${itemsList}</div>
                <div class="order-bottom">
                    <div class="order-total">€${parseFloat(order.total).toFixed(2)}</div>
                    <div class="order-meta">
                        <span class="badge ${payBadge}">${payLabel}</span>
                        <select class="status-select" onchange="updateOrderStatus('${order.id}', this.value)">
                            <option value="pending" ${order.payment_status==='pending'?'selected':''}>待付款</option>
                            <option value="paid" ${order.payment_status==='paid'?'selected':''}>已付款</option>
                            <option value="shipped" ${order.payment_status==='shipped'?'selected':''}>已发货</option>
                            <option value="delivered" ${order.payment_status==='delivered'?'selected':''}>已完成</option>
                        </select>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function updateOrderStatus(orderId, status) {
        await fetch('/.netlify/functions/update-order', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: adminPass, orderId, status })
        });
        loadOrders();
    }
</script>
</body>
</html>
