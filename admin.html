<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 | Vape Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #171717; }

        /* ── Login ── */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2.5rem; width: 340px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
        .login-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .login-box h2 { margin-bottom: 0.25rem; font-size: 1.4rem; }
        .login-box p { color: #737373; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .login-box input { width: 100%; padding: 0.875rem; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; font-family: inherit; transition: border-color 0.2s; }
        .login-box input:focus { outline: none; border-color: #000; }
        .login-btn { width: 100%; padding: 0.875rem; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .login-btn:hover { background: #262626; }
        .login-error { color: #dc2626; font-size: 0.875rem; margin-top: 0.75rem; display: none; }

        /* ── Header ── */
        .admin-header { background: #000; color: #fff; padding: 0.875rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-brand { display: flex; align-items: center; gap: 0.625rem; }
        .header-brand h1 { font-size: 1.1rem; font-weight: 600; }
        .header-brand span { font-size: 1.25rem; }
        .logout-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; background: #262626; color: #fff; border: 1px solid #404040; border-radius: 7px; font-size: 0.875rem; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .logout-btn:hover { background: #404040; }

        /* ── Stats ── */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.875rem; padding: 1.25rem 2rem; }
        .stat-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.125rem 1.25rem; }
        .stat-icon { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
        .stat-label { color: #737373; font-size: 0.8rem; margin-top: 0.3rem; }
        .stat-card.green .stat-value { color: #16a34a; }
        .stat-card.orange .stat-value { color: #d97706; }
        .stat-card.blue .stat-value { color: #2563eb; }
        .stat-card.pink .stat-value { color: #db2777; }
        .stat-card.purple .stat-value { color: #7c3aed; }

        /* ── Filter Bar ── */
        .filter-bar { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0.875rem 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .search-row { display: flex; gap: 0.75rem; align-items: center; }
        .search-wrap { position: relative; flex: 1; max-width: 380px; }
        .search-wrap i { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); color: #a3a3a3; font-size: 0.875rem; }
        .search-input { width: 100%; padding: 0.625rem 0.875rem 0.625rem 2.25rem; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 0.875rem; font-family: inherit; transition: border-color 0.2s; }
        .search-input:focus { outline: none; border-color: #000; }
        .result-count { font-size: 0.8rem; color: #737373; white-space: nowrap; }
        .refresh-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1rem; background: #000; color: #fff; border: none; border-radius: 7px; font-size: 0.8rem; cursor: pointer; font-family: inherit; margin-left: auto; }
        .refresh-btn:hover { background: #262626; }

        .filter-groups { display: flex; flex-wrap: wrap; gap: 1.25rem; }
        .filter-group { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
        .filter-group-label { font-size: 0.75rem; font-weight: 600; color: #737373; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
        .chip { padding: 0.3rem 0.75rem; border: 1px solid #e5e5e5; border-radius: 20px; font-size: 0.78rem; cursor: pointer; background: #fff; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
        .chip:hover { border-color: #a3a3a3; background: #f5f5f5; }
        .chip.active { background: #000; color: #fff; border-color: #000; }

        /* ── Orders ── */
        .orders-section { padding: 1.25rem 2rem 2rem; }
        .order-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; transition: box-shadow 0.2s; }
        .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

        .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.875rem; gap: 0.5rem; }
        .order-top-left { display: flex; align-items: flex-start; gap: 0.875rem; }
        .order-number { font-weight: 700; font-size: 0.95rem; font-family: monospace; }
        .order-date { color: #737373; font-size: 0.78rem; margin-top: 0.2rem; }

        .order-customer-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .order-info-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; color: #525252; }
        .order-info-row i { width: 15px; color: #a3a3a3; font-size: 0.8rem; flex-shrink: 0; }

        .delivery-block { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .delivery-block-title { font-size: 0.75rem; font-weight: 700; color: #1d4ed8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.15rem; }
        .delivery-block .order-info-row { color: #1e3a8a; }
        .delivery-block .order-info-row i { color: #3b82f6; }

        .pickup-tag { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; color: #525252; background: #f5f5f5; border-radius: 6px; padding: 0.3rem 0.625rem; margin-bottom: 0.75rem; }

        .order-items-wrap { background: #f9f9f9; border-radius: 8px; padding: 0.625rem 0.875rem; margin-bottom: 0.875rem; font-size: 0.84rem; color: #525252; line-height: 1.7; }

        .order-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
        .order-total { font-size: 1.3rem; font-weight: 700; }
        .order-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

        /* Badges */
        .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.625rem; border-radius: 20px; font-size: 0.73rem; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-paid { background: #dcfce7; color: #166534; }
        .badge-shipped { background: #dbeafe; color: #1e40af; }
        .badge-delivered { background: #f3e8ff; color: #6b21a8; }
        .badge-bizum { background: #fce7f3; color: #9d174d; }
        .badge-card { background: #e0f2fe; color: #075985; }
        .badge-pickup { background: #f5f5f5; color: #525252; }
        .badge-delivery { background: #eff6ff; color: #1d4ed8; }

        .status-select { padding: 0.375rem 0.625rem; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-family: inherit; }
        .status-select:focus { outline: none; border-color: #000; }

        .empty-state { text-align: center; padding: 3.5rem; color: #737373; }
        .empty-state i { font-size: 2.5rem; margin-bottom: 1rem; display: block; opacity: 0.4; }
        .loading-state { text-align: center; padding: 3rem; color: #737373; }

        @media (max-width: 640px) {
            .stats-grid { padding: 1rem; grid-template-columns: repeat(2, 1fr); }
            .filter-bar { padding: 0.875rem 1rem; }
            .orders-section { padding: 1rem 1rem 2rem; }
            .admin-header { padding: 0.875rem 1rem; }
            .order-info-grid { grid-template-columns: 1fr; }
            .filter-groups { gap: 0.875rem; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <div class="login-logo">🛒</div>
        <h2>Vape Store</h2>
        <p>管理员后台</p>
        <input type="password" id="admin-password-input" placeholder="输入管理密码" onkeydown="if(event.key==='Enter') adminLogin()">
        <button class="login-btn" onclick="adminLogin()">登录</button>
        <p class="login-error" id="login-error">密码错误，请重试</p>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">

    <header class="admin-header">
        <div class="header-brand">
            <span>📦</span>
            <h1>Vape Store 订单管理</h1>
        </div>
        <button class="logout-btn" onclick="adminLogout()">
            <i class="fas fa-sign-out-alt"></i> 退出
        </button>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-list"></i></div>
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">总订单</div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon"><i class="fas fa-euro-sign"></i></div>
            <div class="stat-value" id="stat-revenue">—</div>
            <div class="stat-label">已收入</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-value" id="stat-pending">—</div>
            <div class="stat-label">待处理</div>
        </div>
        <div class="stat-card blue">
            <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
            <div class="stat-value" id="stat-today">—</div>
            <div class="stat-label">今日订单</div>
        </div>
        <div class="stat-card pink">
            <div class="stat-icon"><i class="fas fa-mobile-alt"></i></div>
            <div class="stat-value" id="stat-bizum">—</div>
            <div class="stat-label">Bizum 订单</div>
        </div>
        <div class="stat-card purple">
            <div class="stat-icon"><i class="fas fa-motorcycle"></i></div>
            <div class="stat-value" id="stat-delivery">—</div>
            <div class="stat-label">外送订单</div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="search-row">
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input class="search-input" id="search-input" type="text" placeholder="搜索订单号、姓名、电话..." oninput="applyFilters()">
            </div>
            <span class="result-count" id="result-count"></span>
            <button class="refresh-btn" onclick="loadOrders()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
        <div class="filter-groups">
            <div class="filter-group">
                <span class="filter-group-label">状态</span>
                <button class="chip active" data-group="status" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="status" data-value="pending" onclick="setFilter(this)">待付款</button>
                <button class="chip" data-group="status" data-value="paid" onclick="setFilter(this)">已付款</button>
                <button class="chip" data-group="status" data-value="shipped" onclick="setFilter(this)">已发货</button>
                <button class="chip" data-group="status" data-value="delivered" onclick="setFilter(this)">已完成</button>
            </div>
            <div class="filter-group">
                <span class="filter-group-label">支付</span>
                <button class="chip active" data-group="payment" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="payment" data-value="bizum" onclick="setFilter(this)">Bizum</button>
                <button class="chip" data-group="payment" data-value="card" onclick="setFilter(this)">银行卡</button>
            </div>
            <div class="filter-group">
                <span class="filter-group-label">配送</span>
                <button class="chip active" data-group="delivery" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="delivery" data-value="pickup" onclick="setFilter(this)">自取</button>
                <button class="chip" data-group="delivery" data-value="delivery" onclick="setFilter(this)">外送</button>
            </div>
            <div class="filter-group">
                <span class="filter-group-label">时间</span>
                <button class="chip active" data-group="date" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="date" data-value="today" onclick="setFilter(this)">今天</button>
                <button class="chip" data-group="date" data-value="week" onclick="setFilter(this)">本周</button>
            </div>
        </div>
    </div>

    <!-- Orders -->
    <div class="orders-section">
        <div id="orders-container">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>
</div>

<script>
    const STATUS_LABELS = { pending: '待付款', paid: '已付款', shipped: '已发货', delivered: '已完成' };
    const STATUS_BADGE  = { pending: 'badge-pending', paid: 'badge-paid', shipped: 'badge-shipped', delivered: 'badge-delivered' };

    let adminPass = '';
    let allOrders = [];
    let activeFilters = { status: 'all', payment: 'all', delivery: 'all', date: 'all' };

    function adminLogin() {
        const input = document.getElementById('admin-password-input').value;
        if (!input) return;
        adminPass = input;
        showDashboard();
        loadOrders();
    }

    function adminLogout() {
        adminPass = '';
        allOrders = [];
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-password-input').value = '';
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';

        try {
            const res = await fetch(`/.netlify/functions/get-orders?password=${encodeURIComponent(adminPass)}&status=all`);

            if (res.status === 401) {
                // 密码错误，退回登录
                adminLogout();
                document.getElementById('login-error').style.display = 'block';
                return;
            }

            const data = await res.json();

            if (data && data.debug_error !== undefined) {
                let errMsg = data.debug_error;
                try { errMsg = JSON.stringify(JSON.parse(errMsg), null, 2); } catch(e) {}
                container.innerHTML = `<div class="empty-state" style="color:#dc2626"><b>Supabase 错误 (HTTP ${data.status}):</b><pre style="text-align:left;font-size:0.75rem;margin-top:0.75rem;background:#fee2e2;padding:1rem;border-radius:8px;overflow:auto">${errMsg}</pre></div>`;
                return;
            }

            if (!Array.isArray(data)) {
                container.innerHTML = `<div class="empty-state" style="color:#dc2626">数据格式错误: <pre style="font-size:0.75rem">${JSON.stringify(data)}</pre></div>`;
                return;
            }

            allOrders = data;
            renderStats(allOrders);
            applyFilters();
        } catch (err) {
            container.innerHTML = `<div class="empty-state" style="color:#dc2626">请求失败（本地预览无法访问服务器）: ${err.message}</div>`;
        }
    }

    function showDashboard() {
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    function setFilter(btn) {
        const group = btn.dataset.group;
        activeFilters[group] = btn.dataset.value;
        // Update chip UI
        document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const q = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
        const today = new Date(); today.setHours(0,0,0,0);
        const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 6);

        const filtered = allOrders.filter(o => {
            if (activeFilters.status !== 'all' && o.payment_status !== activeFilters.status) return false;
            if (activeFilters.payment !== 'all' && o.payment_method !== activeFilters.payment) return false;
            if (activeFilters.delivery !== 'all' && (o.delivery_type || 'pickup') !== activeFilters.delivery) return false;
            if (activeFilters.date === 'today') {
                const d = new Date(o.created_at); d.setHours(0,0,0,0);
                if (d.getTime() !== today.getTime()) return false;
            }
            if (activeFilters.date === 'week') {
                if (new Date(o.created_at) < weekAgo) return false;
            }
            if (q) {
                const haystack = `${o.order_number} ${o.customer_name} ${o.customer_phone}`.toLowerCase();
                if (!haystack.includes(q)) return false;
            }
            return true;
        });

        const countEl = document.getElementById('result-count');
        if (countEl) countEl.textContent = filtered.length < allOrders.length ? `找到 ${filtered.length} / ${allOrders.length} 条` : `共 ${allOrders.length} 条`;

        renderOrders(filtered);
    }

    function renderStats(orders) {
        const today = new Date().toDateString();
        const paid     = orders.filter(o => o.payment_status !== 'pending');
        const pending  = orders.filter(o => o.payment_status === 'pending');
        const todayO   = orders.filter(o => new Date(o.created_at).toDateString() === today);
        const bizum    = orders.filter(o => o.payment_method === 'bizum');
        const delivery = orders.filter(o => o.delivery_type === 'delivery');
        const revenue  = paid.reduce((s, o) => s + parseFloat(o.total || 0), 0);

        document.getElementById('stat-total').textContent    = orders.length;
        document.getElementById('stat-revenue').textContent  = '€' + revenue.toFixed(2);
        document.getElementById('stat-pending').textContent  = pending.length;
        document.getElementById('stat-today').textContent    = todayO.length;
        document.getElementById('stat-bizum').textContent    = bizum.length;
        document.getElementById('stat-delivery').textContent = delivery.length;
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        if (!orders.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>暂无符合条件的订单</div>';
            return;
        }

        container.innerHTML = orders.map(order => {
            const date       = new Date(order.created_at).toLocaleString('zh-CN');
            const itemsList  = (order.items || []).map(i => `${i.name} ×${i.quantity}`).join(' · ');
            const payBadge   = order.payment_method === 'bizum' ? 'badge-bizum' : 'badge-card';
            const payLabel   = order.payment_method === 'bizum' ? '<i class="fas fa-mobile-alt"></i> Bizum' : '<i class="fas fa-credit-card"></i> 银行卡';
            const statusBadge = STATUS_BADGE[order.payment_status] || 'badge-pending';
            const statusLabel = STATUS_LABELS[order.payment_status] || order.payment_status;
            const isDelivery  = order.delivery_type === 'delivery';

            return `
            <div class="order-card">
                <div class="order-top">
                    <div class="order-top-left">
                        <div>
                            <div class="order-number">${order.order_number}</div>
                            <div class="order-date"><i class="far fa-clock" style="margin-right:0.3rem"></i>${date}</div>
                        </div>
                    </div>
                    <span class="badge ${statusBadge}">${statusLabel}</span>
                </div>

                <div class="order-customer-row">
                    <div class="order-info-row">
                        <i class="fas fa-user"></i>
                        <span><strong>${order.customer_name}</strong></span>
                    </div>
                    <div class="order-info-row">
                        <i class="fas fa-phone"></i>
                        <span>${order.customer_phone}</span>
                    </div>
                </div>

                ${isDelivery ? `
                <div class="delivery-block">
                    <div class="delivery-block-title"><i class="fas fa-motorcycle"></i> 外送信息</div>
                    <div class="order-info-row">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>${order.address || '—'}</span>
                    </div>
                    <div class="order-info-row">
                        <i class="far fa-clock"></i>
                        <span>期望送达：${order.delivery_time || '未填写'}</span>
                    </div>
                </div>` : `
                <div class="pickup-tag">
                    <i class="fas fa-store"></i> 自取
                </div>`}

                <div class="order-items-wrap">${itemsList}</div>

                <div class="order-bottom">
                    <div class="order-total">€${parseFloat(order.total || 0).toFixed(2)}</div>
                    <div class="order-meta">
                        <span class="badge ${payBadge}">${payLabel}</span>
                        <select class="status-select" onchange="updateOrderStatus('${order.id}', this.value)">
                            <option value="pending"   ${order.payment_status==='pending'  ?'selected':''}>待付款</option>
                            <option value="paid"      ${order.payment_status==='paid'     ?'selected':''}>已付款</option>
                            <option value="shipped"   ${order.payment_status==='shipped'  ?'selected':''}>已发货</option>
                            <option value="delivered" ${order.payment_status==='delivered'?'selected':''}>已完成</option>
                        </select>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function updateOrderStatus(orderId, status) {
        await fetch('/.netlify/functions/update-order', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: adminPass, orderId, status })
        });
        // 更新本地数据，不重新请求
        const order = allOrders.find(o => o.id === orderId);
        if (order) order.payment_status = status;
        renderStats(allOrders);
        applyFilters();
    }
</script>
</body>
</html>
