<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 | Vape Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #171717; }

        /* ── Login ── */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2.5rem; width: 340px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
        .login-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .login-box h2 { margin-bottom: 0.25rem; font-size: 1.4rem; }
        .login-box p { color: #737373; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .login-box input { width: 100%; padding: 0.875rem; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; font-family: inherit; transition: border-color 0.2s; }
        .login-box input:focus { outline: none; border-color: #000; }
        .login-btn { width: 100%; padding: 0.875rem; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .login-btn:hover { background: #262626; }
        .login-error { color: #dc2626; font-size: 0.875rem; margin-top: 0.75rem; display: none; }

        /* ── Header ── */
        .admin-header { background: #000; color: #fff; padding: 0.875rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-brand { display: flex; align-items: center; gap: 0.625rem; }
        .header-brand h1 { font-size: 1.1rem; font-weight: 600; }
        .header-brand span { font-size: 1.25rem; }
        .logout-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; background: #262626; color: #fff; border: 1px solid #404040; border-radius: 7px; font-size: 0.875rem; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .logout-btn:hover { background: #404040; }

        /* ── Stats ── */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.875rem; padding: 1.25rem 2rem; }
        .stat-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.125rem 1.25rem; }
        .stat-icon { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
        .stat-label { color: #737373; font-size: 0.8rem; margin-top: 0.3rem; }
        .stat-card.green .stat-value { color: #16a34a; }
        .stat-card.orange .stat-value { color: #d97706; }
        .stat-card.blue .stat-value { color: #2563eb; }
        .stat-card.pink .stat-value { color: #db2777; }
        .stat-card.purple .stat-value { color: #7c3aed; }

        /* ── Filter Bar ── */
        .filter-bar { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0.875rem 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .search-row { display: flex; gap: 0.75rem; align-items: center; }
        .search-wrap { position: relative; flex: 1; max-width: 380px; }
        .search-wrap i { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); color: #a3a3a3; font-size: 0.875rem; }
        .search-input { width: 100%; padding: 0.625rem 0.875rem 0.625rem 2.25rem; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 0.875rem; font-family: inherit; transition: border-color 0.2s; }
        .search-input:focus { outline: none; border-color: #000; }
        .result-count { font-size: 0.8rem; color: #737373; white-space: nowrap; }
        .refresh-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1rem; background: #000; color: #fff; border: none; border-radius: 7px; font-size: 0.8rem; cursor: pointer; font-family: inherit; margin-left: auto; }
        .refresh-btn:hover { background: #262626; }

        /* 自动刷新控件 */
        .auto-refresh-control { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
        .auto-refresh-toggle { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: #525252; cursor: pointer; }
        .auto-refresh-toggle input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .last-refresh-time { font-size: 0.75rem; color: #737373; white-space: nowrap; }

        .filter-groups { display: flex; flex-wrap: wrap; gap: 1.25rem; }
        .filter-group { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
        .filter-group-label { font-size: 0.75rem; font-weight: 600; color: #737373; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
        .chip { padding: 0.3rem 0.75rem; border: 1px solid #e5e5e5; border-radius: 20px; font-size: 0.78rem; cursor: pointer; background: #fff; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
        .chip:hover { border-color: #a3a3a3; background: #f5f5f5; }
        .chip.active { background: #000; color: #fff; border-color: #000; }

        /* ── Orders ── */
        .orders-section { padding: 1.25rem 2rem 2rem; }
        .order-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; transition: box-shadow 0.2s; }
        .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

        /* ── WhatsApp ── */
        .wa-wrap { position: relative; display: inline-block; }
        .wa-btn { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.45rem 0.875rem; background: #25d366; color: #fff; border: none; border-radius: 7px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .wa-btn:hover { background: #1ebe5c; }
        .wa-dropdown { display: none; position: absolute; bottom: calc(100% + 6px); right: 0; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); min-width: 200px; z-index: 50; overflow: hidden; }
        .wa-dropdown.open { display: block; }
        .wa-dropdown-title { padding: 0.5rem 0.875rem; font-size: 0.75rem; color: #737373; border-bottom: 1px solid #f0f0f0; }
        .wa-dropdown a { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 0.875rem; font-size: 0.8rem; color: #171717; text-decoration: none; transition: background 0.15s; }
        .wa-dropdown a:hover { background: #f5f5f5; }
        .wa-dropdown a i { color: #25d366; width: 14px; }

        .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.875rem; gap: 0.5rem; }
        .order-top-left { display: flex; align-items: flex-start; gap: 0.875rem; }
        .order-number { font-weight: 700; font-size: 0.95rem; font-family: monospace; }
        .order-date { color: #737373; font-size: 0.78rem; margin-top: 0.2rem; }

        .order-customer-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .order-info-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; color: #525252; }
        .order-info-row i { width: 15px; color: #a3a3a3; font-size: 0.8rem; flex-shrink: 0; }

        /* ── Inventory ── */
        .inv-product { background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:0.75rem;overflow:hidden }
        .inv-product-header { padding:0.875rem 1.25rem;background:#fafafa;border-bottom:1px solid #e5e5e5;font-weight:600;font-size:0.9rem;display:flex;align-items:center;gap:0.5rem }
        .inv-table { width:100%;border-collapse:collapse }
        .inv-table th { padding:0.5rem 1.25rem;text-align:left;font-size:0.75rem;color:#737373;font-weight:500;border-bottom:1px solid #f0f0f0 }
        .inv-table td { padding:0.625rem 1.25rem;border-bottom:1px solid #f5f5f5;font-size:0.875rem }
        .inv-table tr:last-child td { border-bottom:none }
        .inv-stock-input { width:80px;padding:0.375rem 0.625rem;border:1px solid #e5e5e5;border-radius:6px;font-size:0.875rem;font-family:inherit;text-align:center;transition:border-color 0.2s }
        .inv-stock-input:focus { outline:none;border-color:#000 }
        .stock-ok { color:#16a34a;font-weight:600 }
        .stock-low { color:#d97706;font-weight:600 }
        .stock-zero { color:#dc2626;font-weight:700 }
        .sold-out-tag { display:inline-block;background:#fee2e2;color:#dc2626;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px }
        .low-tag { display:inline-block;background:#fef3c7;color:#d97706;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px }

        .delivery-block { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .delivery-block-title { font-size: 0.75rem; font-weight: 700; color: #1d4ed8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.15rem; }
        .delivery-block .order-info-row { color: #1e3a8a; }
        .delivery-block .order-info-row i { color: #3b82f6; }

        .pickup-tag { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; color: #525252; background: #f5f5f5; border-radius: 6px; padding: 0.3rem 0.625rem; margin-bottom: 0.75rem; }

        .order-items-wrap { background: #f9f9f9; border-radius: 8px; padding: 0.625rem 0.875rem; margin-bottom: 0.875rem; font-size: 0.84rem; color: #525252; line-height: 1.7; }

        .order-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
        .order-total { font-size: 1.3rem; font-weight: 700; }
        .order-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

        /* Badges */
        .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.625rem; border-radius: 20px; font-size: 0.73rem; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-paid { background: #dcfce7; color: #166534; }
        .badge-shipped { background: #dbeafe; color: #1e40af; }
        .badge-delivered { background: #f3e8ff; color: #6b21a8; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }
        .badge-bizum { background: #fce7f3; color: #9d174d; }
        .badge-card { background: #e0f2fe; color: #075985; }
        .badge-cash { background: #dcfce7; color: #166534; }
        .badge-pickup { background: #f5f5f5; color: #525252; }
        .badge-delivery { background: #eff6ff; color: #1d4ed8; }

        .status-select { padding: 0.375rem 0.625rem; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-family: inherit; }
        .status-select:focus { outline: none; border-color: #000; }

        .empty-state { text-align: center; padding: 3.5rem; color: #737373; }
        .empty-state i { font-size: 2.5rem; margin-bottom: 1rem; display: block; opacity: 0.4; }
        .loading-state { text-align: center; padding: 3rem; color: #737373; }

        @media (max-width: 640px) {
            .stats-grid { padding: 1rem; grid-template-columns: repeat(2, 1fr); }
            .filter-bar { padding: 0.875rem 1rem; }
            .orders-section { padding: 1rem 1rem 2rem; }
            .admin-header { padding: 0.875rem 1rem; }
            .order-info-grid { grid-template-columns: 1fr; }
            .filter-groups { gap: 0.875rem; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <div class="login-logo">🛒</div>
        <h2>Vape Store</h2>
        <p>管理员后台</p>
        <input type="password" id="admin-password-input" placeholder="输入管理密码" onkeydown="if(event.key==='Enter') adminLogin()">
        <button class="login-btn" onclick="adminLogin()">登录</button>
        <p class="login-error" id="login-error">密码错误，请重试</p>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">

    <header class="admin-header">
        <div class="header-brand">
            <span>📦</span>
            <h1>Vape Store 订单管理</h1>
        </div>
        <button class="logout-btn" onclick="adminLogout()">
            <i class="fas fa-sign-out-alt"></i> 退出
        </button>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-list"></i></div>
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">总订单</div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon"><i class="fas fa-euro-sign"></i></div>
            <div class="stat-value" id="stat-revenue">—</div>
            <div class="stat-label">已收入</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-value" id="stat-pending">—</div>
            <div class="stat-label">待处理</div>
        </div>
        <div class="stat-card blue">
            <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
            <div class="stat-value" id="stat-today">—</div>
            <div class="stat-label">今日订单</div>
        </div>
        <div class="stat-card pink">
            <div class="stat-icon"><i class="fas fa-mobile-alt"></i></div>
            <div class="stat-value" id="stat-bizum">—</div>
            <div class="stat-label">Bizum 订单</div>
        </div>
        <div class="stat-card purple">
            <div class="stat-icon"><i class="fas fa-motorcycle"></i></div>
            <div class="stat-value" id="stat-delivery">—</div>
            <div class="stat-label">外送订单</div>
        </div>
    </div>

    <!-- Tab Bar -->
    <div style="background:#fff;border-bottom:1px solid #e5e5e5;padding:0 2rem;display:flex;gap:0">
        <button id="tab-orders" onclick="switchTab('orders')" style="padding:0.75rem 1.25rem;border:none;background:none;font-size:0.875rem;font-weight:600;cursor:pointer;border-bottom:2px solid #000;color:#000;font-family:inherit">
            <i class="fas fa-list"></i> 订单管理
        </button>
        <button id="tab-inventory" onclick="switchTab('inventory')" style="padding:0.75rem 1.25rem;border:none;background:none;font-size:0.875rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#737373;font-family:inherit">
            <i class="fas fa-boxes"></i> 库存管理
        </button>
        <button id="tab-agents" onclick="switchTab('agents')" style="padding:0.75rem 1.25rem;border:none;background:none;font-size:0.875rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#737373;font-family:inherit">
            <i class="fas fa-users"></i> 代理统计
        </button>
        <button id="tab-users" onclick="switchTab('users')" style="padding:0.75rem 1.25rem;border:none;background:none;font-size:0.875rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#737373;font-family:inherit">
            <i class="fas fa-user-friends"></i> 注册用户
        </button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="search-row">
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input class="search-input" id="search-input" type="text" placeholder="搜索订单号、姓名、电话..." oninput="applyFilters()">
            </div>
            <span class="result-count" id="result-count"></span>
            <button class="refresh-btn" onclick="loadOrders()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
            <div class="auto-refresh-control">
                <label class="auto-refresh-toggle">
                    <input type="checkbox" id="auto-refresh-toggle" checked>
                    自动刷新（60秒）
                </label>
                <span class="last-refresh-time" id="last-refresh-time">最后刷新：--:--:--</span>
            </div>
        </div>
        <div class="filter-groups">
            <div class="filter-group">
                <span class="filter-group-label">状态</span>
                <button class="chip active" data-group="status" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="status" data-value="pending" onclick="setFilter(this)">待付款</button>
                <button class="chip" data-group="status" data-value="paid" onclick="setFilter(this)">已付款</button>
                <button class="chip" data-group="status" data-value="shipped" onclick="setFilter(this)">已发货</button>
                <button class="chip" data-group="status" data-value="delivered" onclick="setFilter(this)">已完成</button>
            </div>
            <div class="filter-group">
                <span class="filter-group-label">支付</span>
                <button class="chip active" data-group="payment" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="payment" data-value="bizum" onclick="setFilter(this)">Bizum</button>
                <button class="chip" data-group="payment" data-value="card" onclick="setFilter(this)">银行卡</button>
                <button class="chip" data-group="payment" data-value="cash" onclick="setFilter(this)">现金</button>
            </div>
            <div class="filter-group">
                <span class="filter-group-label">配送</span>
                <button class="chip active" data-group="delivery" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="delivery" data-value="pickup" onclick="setFilter(this)">自取</button>
                <button class="chip" data-group="delivery" data-value="delivery" onclick="setFilter(this)">外送</button>
            </div>
            <div class="filter-group">
                <span class="filter-group-label">时间</span>
                <button class="chip active" data-group="date" data-value="all" onclick="setFilter(this)">全部</button>
                <button class="chip" data-group="date" data-value="today" onclick="setFilter(this)">今天</button>
                <button class="chip" data-group="date" data-value="week" onclick="setFilter(this)">本周</button>
            </div>
        </div>
    </div>

    <!-- Orders -->
    <div id="section-orders">
    <div class="orders-section">
        <div id="orders-container">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>
    </div>

    <!-- Agents -->
    <div id="section-agents" style="display:none;padding:1.25rem 2rem 2rem">
        <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem">产品销量统计</h3>
        <div id="product-stats-container" style="margin-bottom:2rem"><div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div></div>
        <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem">代理统计</h3>
        <div id="agents-container"><div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div></div>
    </div>

    <!-- Inventory -->
    <!-- 注册用户 Tab -->
    <div id="section-users" style="display:none;padding:1.25rem 2rem 2rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
            <div>
                <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:0.25rem">注册用户</h2>
                <p id="users-count-label" style="font-size:0.85rem;color:#737373">加载中...</p>
            </div>
            <button onclick="loadUsers()" style="padding:0.5rem 1rem;border:1px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer;font-size:0.8rem;font-family:inherit"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
        <div id="users-container">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>

    <div id="section-inventory" style="display:none;padding:1.25rem 2rem 2rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <h3 style="font-size:1rem;font-weight:600">库存管理</h3>
            <div style="display:flex;gap:0.5rem">
                <button onclick="loadInventory()" style="padding:0.5rem 1rem;border:1px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer;font-size:0.8rem;font-family:inherit"><i class="fas fa-sync-alt"></i> 刷新</button>
                <button onclick="saveInventory()" style="padding:0.5rem 1rem;border:none;border-radius:8px;background:#000;color:#fff;cursor:pointer;font-size:0.8rem;font-weight:600;font-family:inherit"><i class="fas fa-save"></i> 保存库存</button>
            </div>
        </div>
        <div id="inventory-container">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>
</div>

<script>
    const STATUS_LABELS = { pending: '待付款', paid: '已付款', shipped: '已发货', delivered: '已完成', cancelled: '已取消' };
    const STATUS_BADGE  = { pending: 'badge-pending', paid: 'badge-paid', shipped: 'badge-shipped', delivered: 'badge-delivered', cancelled: 'badge-cancelled' };

    let adminPass = '';
    let allOrders = [];
    let activeFilters = { status: 'all', payment: 'all', delivery: 'all', date: 'all' };

    // 自动刷新相关变量
    let autoRefreshTimer = null;
    const AUTO_REFRESH_INTERVAL = 60000; // 60秒
    let lastRefreshTime = null;

    function adminLogin() {
        const input = document.getElementById('admin-password-input').value;
        if (!input) return;
        adminPass = input;
        showDashboard();
        loadOrders();
    }

    function adminLogout() {
        adminPass = '';
        allOrders = [];
        stopAutoRefresh(); // 停止自动刷新
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-password-input').value = '';
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';

        try {
            const res = await fetch(`/.netlify/functions/get-orders?password=${encodeURIComponent(adminPass)}&status=all`);

            if (res.status === 401) {
                // 密码错误，退回登录
                adminLogout();
                document.getElementById('login-error').style.display = 'block';
                return;
            }

            const data = await res.json();

            if (data && data.debug_error !== undefined) {
                let errMsg = data.debug_error;
                try { errMsg = JSON.stringify(JSON.parse(errMsg), null, 2); } catch(e) {}
                container.innerHTML = `<div class="empty-state" style="color:#dc2626"><b>Supabase 错误 (HTTP ${data.status}):</b><pre style="text-align:left;font-size:0.75rem;margin-top:0.75rem;background:#fee2e2;padding:1rem;border-radius:8px;overflow:auto">${errMsg}</pre></div>`;
                return;
            }

            if (!Array.isArray(data)) {
                container.innerHTML = `<div class="empty-state" style="color:#dc2626">数据格式错误: <pre style="font-size:0.75rem">${JSON.stringify(data)}</pre></div>`;
                return;
            }

            allOrders = data;
            renderStats(allOrders);
            applyFilters();
            updateLastRefreshTime();
        } catch (err) {
            container.innerHTML = `<div class="empty-state" style="color:#dc2626">请求失败（本地预览无法访问服务器）: ${err.message}</div>`;
        }
    }

    function showDashboard() {
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        // 设置自动刷新
        setupAutoRefresh();
    }

    // 自动刷新功能
    function updateLastRefreshTime() {
        lastRefreshTime = new Date();
        const timeStr = lastRefreshTime.toLocaleTimeString('zh-CN', { hour12: false });
        const element = document.getElementById('last-refresh-time');
        if (element) {
            element.textContent = `最后刷新：${timeStr}`;
        }
    }

    function startAutoRefresh() {
        stopAutoRefresh(); // 先停止现有的定时器
        autoRefreshTimer = setInterval(() => {
            console.log('自动刷新订单数据...');
            loadOrders();
        }, AUTO_REFRESH_INTERVAL);
    }

    function stopAutoRefresh() {
        if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
    }

    function setupAutoRefresh() {
        const toggle = document.getElementById('auto-refresh-toggle');
        if (!toggle) return;

        toggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        });

        // 初始启动（默认已勾选）
        if (toggle.checked) {
            startAutoRefresh();
        }
    }

    // 页面卸载时停止定时器
    window.addEventListener('beforeunload', () => {
        stopAutoRefresh();
    });

    function setFilter(btn) {
        const group = btn.dataset.group;
        activeFilters[group] = btn.dataset.value;
        // Update chip UI
        document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const q = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
        const today = new Date(); today.setHours(0,0,0,0);
        const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 6);

        const filtered = allOrders.filter(o => {
            if (activeFilters.status !== 'all' && o.payment_status !== activeFilters.status) return false;
            if (activeFilters.payment !== 'all' && o.payment_method !== activeFilters.payment) return false;
            if (activeFilters.delivery !== 'all' && (o.delivery_type || 'pickup') !== activeFilters.delivery) return false;
            if (activeFilters.date === 'today') {
                const d = new Date(o.created_at); d.setHours(0,0,0,0);
                if (d.getTime() !== today.getTime()) return false;
            }
            if (activeFilters.date === 'week') {
                if (new Date(o.created_at) < weekAgo) return false;
            }
            if (q) {
                const haystack = `${o.order_number} ${o.customer_name} ${o.customer_phone}`.toLowerCase();
                if (!haystack.includes(q)) return false;
            }
            return true;
        });

        const countEl = document.getElementById('result-count');
        if (countEl) countEl.textContent = filtered.length < allOrders.length ? `找到 ${filtered.length} / ${allOrders.length} 条` : `共 ${allOrders.length} 条`;

        renderOrders(filtered);
    }

    function renderStats(orders) {
        const today = new Date().toDateString();
        const paid     = orders.filter(o => o.payment_status !== 'pending');
        const pending  = orders.filter(o => o.payment_status === 'pending');
        const todayO   = orders.filter(o => new Date(o.created_at).toDateString() === today);
        const bizum    = orders.filter(o => o.payment_method === 'bizum');
        const delivery = orders.filter(o => o.delivery_type === 'delivery');
        const revenue  = paid.reduce((s, o) => s + parseFloat(o.total || 0), 0);

        document.getElementById('stat-total').textContent    = orders.length;
        document.getElementById('stat-revenue').textContent  = '€' + revenue.toFixed(2);
        document.getElementById('stat-pending').textContent  = pending.length;
        document.getElementById('stat-today').textContent    = todayO.length;
        document.getElementById('stat-bizum').textContent    = bizum.length;
        document.getElementById('stat-delivery').textContent = delivery.length;
    }

    // ── Product Sales Stats ──
    function renderProductStats() {
        const container = document.getElementById('product-stats-container');
        if (!allOrders.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> 暂无订单数据</div>';
            return;
        }

        // 只统计已付款/已发货/已完成的订单
        const paidOrders = allOrders.filter(o => ['paid','shipped','delivered'].includes(o.payment_status));

        // 按产品名称汇总销量
        const productSales = {};
        paidOrders.forEach(o => {
            const items = Array.isArray(o.items) ? o.items : [];
            items.forEach(item => {
                const name = item.productName || item.name || '未知产品';
                if (!productSales[name]) productSales[name] = { qty: 0, revenue: 0 };
                productSales[name].qty += (item.quantity || item.qty || 1);
                productSales[name].revenue += (item.price || 0) * (item.quantity || item.qty || 1);
            });
        });

        const totalQty = Object.values(productSales).reduce((s, v) => s + v.qty, 0);
        const totalRevenue = Object.values(productSales).reduce((s, v) => s + v.revenue, 0);

        const sorted = Object.entries(productSales).sort((a, b) => b[1].qty - a[1].qty);

        const rows = sorted.map(([name, data]) => `
            <tr style="border-bottom:1px solid #f5f5f5">
                <td style="padding:0.7rem 1rem;font-weight:500">${name}</td>
                <td style="padding:0.7rem 1rem;text-align:center;font-weight:700;font-size:1rem">${data.qty}</td>
                <td style="padding:0.7rem 1rem;text-align:right;color:#16a34a;font-weight:600">€${data.revenue.toFixed(2)}</td>
                <td style="padding:0.7rem 1rem;text-align:right;color:#737373;font-size:0.8rem">${totalQty ? Math.round(data.qty / totalQty * 100) : 0}%</td>
            </tr>`).join('');

        container.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;margin-bottom:1.25rem">
            <div style="background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem;text-align:center">
                <div style="font-size:1.5rem;font-weight:700">${totalQty}</div>
                <div style="font-size:0.8rem;color:#737373;margin-top:0.25rem">已售总支数</div>
            </div>
            <div style="background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem;text-align:center">
                <div style="font-size:1.5rem;font-weight:700;color:#16a34a">€${totalRevenue.toFixed(2)}</div>
                <div style="font-size:0.8rem;color:#737373;margin-top:0.25rem">已付产品总额</div>
            </div>
        </div>
        <div style="background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden">
            <table style="width:100%;border-collapse:collapse;font-size:0.875rem">
                <thead>
                    <tr style="background:#fafafa;border-bottom:1px solid #e5e5e5">
                        <th style="padding:0.75rem 1rem;text-align:left;font-weight:600">产品</th>
                        <th style="padding:0.75rem 1rem;text-align:center;font-weight:600">已售支数</th>
                        <th style="padding:0.75rem 1rem;text-align:right;font-weight:600">销售额</th>
                        <th style="padding:0.75rem 1rem;text-align:right;font-weight:600">占比</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }

    // ── Agent Stats ──
    function renderAgentStats() {
        renderProductStats();
        const container = document.getElementById('agents-container');
        if (!allOrders.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> 暂无订单数据</div>';
            return;
        }

        // 按 agent_ref 分组
        const groups = {};
        allOrders.forEach(o => {
            const ref = o.agent_ref || '__direct__';
            if (!groups[ref]) groups[ref] = [];
            groups[ref].push(o);
        });

        // 排序：代理在前，直接订单在后
        const keys = Object.keys(groups).sort((a, b) => {
            if (a === '__direct__') return 1;
            if (b === '__direct__') return -1;
            return groups[b].length - groups[a].length;
        });

        const rows = keys.map(ref => {
            const orders = groups[ref];
            const paid = orders.filter(o => o.payment_status !== 'pending');
            const pending = orders.filter(o => o.payment_status === 'pending');
            const revenue = paid.reduce((s, o) => s + parseFloat(o.total || 0), 0);
            const label = ref === '__direct__' ? '直接订单（无代理）' : ref;
            const linkHtml = ref !== '__direct__'
                ? `<a href="?ref=${ref}" target="_blank" style="font-size:0.75rem;color:#2563eb">🔗 推广链接</a>`
                : '';
            return `
            <tr>
                <td style="font-weight:600">${label} ${linkHtml}</td>
                <td style="text-align:center">${orders.length}</td>
                <td style="text-align:center;color:#16a34a;font-weight:600">${paid.length}</td>
                <td style="text-align:center;color:#d97706">${pending.length}</td>
                <td style="text-align:right;font-weight:700">€${revenue.toFixed(2)}</td>
                <td style="text-align:center">
                    ${ref !== '__direct__' ? `<button onclick="filterByAgent('${ref}')" style="padding:0.25rem 0.75rem;border:1px solid #e5e5e5;border-radius:6px;background:#fff;cursor:pointer;font-size:0.8rem">查看订单</button>` : ''}
                </td>
            </tr>`;
        }).join('');

        // 汇总
        const agentCount = keys.filter(k => k !== '__direct__').length;
        const agentOrders = allOrders.filter(o => o.agent_ref);
        const agentRevenue = agentOrders.filter(o => o.payment_status !== 'pending').reduce((s, o) => s + parseFloat(o.total || 0), 0);

    async function deleteOrder(orderId, orderNumber) {
        if (!confirm(`确定要删除订单 ${orderNumber} 吗？此操作不可撤销。`)) return;
        const res = await fetch('/.netlify/functions/delete-order', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: adminPass, orderId })
        });
        if (res.ok) {
            allOrders = allOrders.filter(o => o.id !== orderId);
            renderStats(allOrders);
            applyFilters();
        } else {
            alert('删除失败，请重试');
        }
    }

        if (countEl) countEl.textContent = `代理 ${ref}：共 ${agentOrders.length} 条订单`;

    let inventoryData = {};

    async function loadInventory() {
        document.getElementById('inventory-container').innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
        const res = await fetch('/.netlify/functions/get-inventory');
        const rows = await res.json();
        inventoryData = {};
        (rows || []).forEach(r => { inventoryData[`${r.product_id}-${r.flavor_name}`] = r.stock; });
        renderInventory();
    }

    function renderInventory() {
        const container = document.getElementById('inventory-container');
        container.innerHTML = PRODUCTS_DEF.map(p => {
            // 口味排序：有货在前，售罄在后
            const sortedFlavors = [...p.flavors].sort((a, b) => {
                const aStock = parseInt(inventoryData[`${p.id}-${a.key}`]);
                const bStock = parseInt(inventoryData[`${p.id}-${b.key}`]);
                const aZero = !isNaN(aStock) && aStock === 0;
                const bZero = !isNaN(bStock) && bStock === 0;
                return aZero - bZero;
            });
            const rows = sortedFlavors.map(f => {
                const key = `${p.id}-${f.key}`;
                const stock = inventoryData[key] ?? '';
                const stockNum = parseInt(stock);
                const tag = isNaN(stockNum) ? '' : stockNum === 0 ? '<span class="sold-out-tag">售罄</span>' : stockNum <= 5 ? '<span class="low-tag">低库存</span>' : '';
                const cls = isNaN(stockNum) ? '' : stockNum === 0 ? 'stock-zero' : stockNum <= 5 ? 'stock-low' : 'stock-ok';
                return `<tr>
                    <td>${f.label}${tag}</td>
                    <td><input class="inv-stock-input ${cls}" type="number" min="0" data-key="${key}" data-pid="${p.id}" data-fname="${f.key}" data-pname="${p.name}" value="${stock}" placeholder="—" oninput="onStockInput(this)"></td>
                </tr>`;
            }).join('');
            return `<div class="inv-product">
                <div class="inv-product-header"><i class="fas fa-box"></i> ${p.name}</div>
                <table class="inv-table">
                    <thead><tr><th>口味</th><th>库存数量</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        }).join('');
    }

    function onStockInput(el) {
        const v = parseInt(el.value);
        el.className = 'inv-stock-input ' + (isNaN(v) ? '' : v === 0 ? 'stock-zero' : v <= 5 ? 'stock-low' : 'stock-ok');
    }

    async function saveInventory() {
        const inputs = document.querySelectorAll('.inv-stock-input');
        const items = [];
        inputs.forEach(el => {
            const v = parseInt(el.value);
            if (!isNaN(v)) {
                items.push({ product_id: parseInt(el.dataset.pid), product_name: el.dataset.pname, flavor_name: el.dataset.fname, stock: v });
            }
        });
        if (!items.length) return;
        const btn = document.querySelector('[onclick="saveInventory()"]');
        btn.textContent = '保存中...'; btn.disabled = true;
        try {
            const res = await fetch('/.netlify/functions/set-inventory', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: adminPass, items })
            });
            if (!res.ok) throw new Error(await res.text());
            btn.innerHTML = '<i class="fas fa-check"></i> 已保存';
            items.forEach(i => { inventoryData[`${i.product_id}-${i.flavor_name}`] = i.stock; });
        } catch (err) {
            btn.innerHTML = '<i class="fas fa-times"></i> 保存失败';
            alert('保存失败：' + err.message);
        }
        setTimeout(() => { btn.innerHTML = '<i class="fas fa-save"></i> 保存库存'; btn.disabled = false; }, 2000);
    }

    function toggleWaDropdown(id) {
        const drop = document.getElementById(`drop-${id}`);
        const isOpen = drop.classList.contains('open');
        document.querySelectorAll('.wa-dropdown.open').forEach(d => d.classList.remove('open'));
        if (!isOpen) drop.classList.add('open');
    }

    function closeWaDropdown(id) {
        document.getElementById(`drop-${id}`)?.classList.remove('open');
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.wa-wrap')) {
            document.querySelectorAll('.wa-dropdown.open').forEach(d => d.classList.remove('open'));
        }
    });

    async function updateOrderStatus(orderId, status) {
        await fetch('/.netlify/functions/update-order', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: adminPass, orderId, status })
        });
        const order = allOrders.find(o => o.id === orderId);
        if (order) {
            order.payment_status = status;
            // 状态变更时推 Telegram 提醒 + WhatsApp 链接
            fetch('/.netlify/functions/notify-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customerName: order.customer_name,
                    customerPhone: order.customer_phone,
                    orderNumber: order.order_number,
                    status,
                    total: order.total
                })
            }).catch(() => {});
        }
        renderStats(allOrders);
        applyFilters();
    }
