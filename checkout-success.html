<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 | Vape Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-page { text-align: center; padding: 3rem; max-width: 480px; }
        .success-icon { font-size: 5rem; color: #22c55e; margin-bottom: 1.5rem; }
        .success-page h1 { font-size: 1.75rem; margin-bottom: 1rem; }
        .success-page p { color: #737373; margin-bottom: 0.75rem; font-size: 1.1rem; }
        .order-number { font-size: 1.25rem; font-weight: 700; color: #000; margin: 1rem 0; }
        .success-page .btn { margin-top: 1.5rem; text-decoration: none; }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h1>¡Pago exitoso! 支付成功！</h1>
        <p class="order-number" id="order-display"></p>
        <p>Te contactaremos pronto para confirmar el envío.</p>
        <p>我们将尽快联系您确认发货。</p>
        <a href="/" class="btn btn-primary">继续购物 / Seguir comprando</a>
    </div>
    <script>
        const order = new URLSearchParams(location.search).get('order');
        if (order) document.getElementById('order-display').textContent = '订单号 / Pedido: ' + order;
    </script>
</body>
</html>
